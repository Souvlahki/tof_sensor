controller_manager:
  ros__parameters:
    update_rate: 50

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    range_sensor_broadcaster:
      type: range_sensor_broadcaster/RangeSensorBroadcaster

range_sensor_broadcaster:
  ros__parameters:
    sensor_name: "base_tof_sensor_1_joint"
    frame_id: "tof_sensor_1_link"
    radiation_type: 1
    field_of_view: 0.1
    max_range: 2.6
    min_range: 0.005
